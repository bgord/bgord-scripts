name: Healthcheck
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
concurrency:
  group: ci-healthcheck-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  healthcheck:
    name: Run healthcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Run healthcheck
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          BASIC_AUTH_PRODUCTION: ${{ secrets.BASIC_AUTH_PRODUCTION }}
        run: ./bgord-scripts/healthcheck.sh "${PROJECT_NAME}" "${BASIC_AUTH_PRODUCTION}"

      - name: Notify on failure
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          LOBBYGOW_API_KEY: ${{ secrets.LOBBYGOW_API_KEY }}
        if: ${{ always() && steps.run_healthcheck.outcome == 'failure' }}
        run: |
          curl -sS -X POST "https://lobbygow.bgord.dev/api/notification-send" \
            -H "Content-Type: application/json" \
            -H "api-key: ${LOBBYGOW_API_KEY}" \
            --data "{\"kind\":\"error\",\"subject\":\"[${PROJECT_NAME}] healthcheck\",\"content\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
