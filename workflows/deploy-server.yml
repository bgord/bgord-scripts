name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      fasttrack:
        description: "Skip build verify"
        type: boolean
        default: false
concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  deploy:
    name: Deploy server
    runs-on: ubuntu-26.04
    env:
      GITLEAKS_VERSION: 8.30.0
    steps:
      - name: Clone repositories
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun environment
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Bun install
        run: bun install --exact --frozen-lockfile --no-summary

      - name: Create .env.test file
        env:
          ENV_TEST: ${{ secrets.ENV_TEST }}
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        run: echo "${ENV_TEST}" > .env.test

      - name: Read Playwright version
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        id: pw
        run: |
          VERSION=$(jq -r '.devDependencies["@playwright/test"] // "unknown"' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ms-pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Cache TS buildinfo
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            **/*.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig*.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Read ShellCheck wrapper version
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        id: sc
        run: |
          VERSION=$(jq -r '.devDependencies.shellcheck // "unknown"' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache ShellCheck
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules/shellcheck/bin
          key: shellcheck-${{ runner.os }}-${{ steps.sc.outputs.version }}

      - name: Cache Gitleaks
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        id: gl-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/runner/.local/bin/gitleaks
          key: gitleaks-${{ runner.os }}-${{ env.GITLEAKS_VERSION }}

      - name: Install Gitleaks
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) && steps.gl-cache.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p /home/runner/.local/bin
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /home/runner/.local/bin gitleaks

      - name: Add Gitleaks to PATH
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        run: echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - parallel:
          - name: Typecheck
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/typecheck.sh
          - name: E2E run
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/e2e-run.sh
          - name: Check dead code
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-dead-code.sh
          - name: Test
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/test.sh
          - name: Check boundaries
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-boundaries.sh
          - name: Check engines
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-engines.sh
          - name: Check deps audit
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-deps-audit.sh
          - name: Check lockfile
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-lockfile.sh
          - name: Check shell
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-shell.sh
          - name: Check code
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-code.sh
          - name: Check secrets
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-secrets.sh
          - name: Check drift
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-drift.sh
          - name: Check deps pin
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-deps-pin.sh
          - name: Check deps ensure
            if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
            run: ./bgord-scripts/check-deps-ensure.sh

      - name: Build app
        run: ./scripts/server-build-production.sh

      - name: Generate build info
        env:
          SHA: ${{ github.sha }}
        run: ./bgord-scripts/build-info-generate.sh "${SHA}"

      - name: Inspect app size
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fasttrack) }}
        run: ./bgord-scripts/server-inspect-production.sh "${PROJECT_NAME}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/production.key
          chmod 600 ~/.ssh/production.key
          cat >>~/.ssh/config <<END
          Host production
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/production.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.USER }}
          SSH_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTNAME }}

      - name: Clean public
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: ssh production "cd /var/www/${PROJECT_NAME} && rm -rf public/"

      - name: Sync source code
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: rsync -azP output/ "production:/var/www/${PROJECT_NAME}"

      - name: Restart server
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: ssh production sudo systemctl restart "${PROJECT_NAME}.service"
