assert_lefthook_installed: true
output: false
pre-push:
  parallel: true
  commands:
    typecheck:
      run: ./bgord-scripts/typecheck.sh
    dead-code:
      run: ./bgord-scripts/dead-code.sh
    test:
      run: ./bgord-scripts/test.sh
    compare-configs:
      run: ./bgord-scripts/compare-configs.sh
    deps-pin:
      run: ./bgord-scripts/deps-pin.sh
    boundaries:
      run: ./bgord-scripts/boundaries.sh
    deps-ensure:
      run: ./bgord-scripts/deps-ensure.sh
    deps-audit:
      run: ./bgord-scripts/deps-audit.sh
    lockfile-lint:
      run: ./bgord-scripts/lockfile-lint.sh
    ci-lint:
      run: ./bgord-scripts/ci-lint.sh

pre-commit:
  parallel: true
  commands:
    format-staged:
      run: ./bgord-scripts/format-staged.sh
      stage_fixed: true
    cspell:
      run: ./bgord-scripts/cspell.sh
    shellcheck:
      glob: "*.{sh}"
      run: ./bgord-scripts/shellcheck.sh
    biome-check:
      run: ./bgord-scripts/biome-check.sh
      stage_fixed: true
    gitleaks-scan-staged:
      run: ./bgord-scripts/gitleaks-scan-staged.sh
