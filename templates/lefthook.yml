assert_lefthook_installed: true
output: false
pre-push:
  parallel: true
  commands:
    typecheck:
      run: ./bgord-scripts/typecheck.sh
    check-dead-code:
      run: ./bgord-scripts/check-dead-code.sh
    test:
      run: ./bgord-scripts/test.sh
    check-drift:
      run: ./bgord-scripts/check-drift.sh
    check-deps-pin:
      run: ./bgord-scripts/check-deps-pin.sh
    check-boundaries:
      run: ./bgord-scripts/check-boundaries.sh
    check-deps-ensure:
      run: ./bgord-scripts/check-deps-ensure.sh
    check-deps-audit:
      run: ./bgord-scripts/check-deps-audit.sh
    check-lockfile:
      run: ./bgord-scripts/check-lockfile.sh
    check-ci:
      run: ./bgord-scripts/check-ci.sh

pre-commit:
  parallel: true
  commands:
    format-staged:
      run: ./bgord-scripts/format-staged.sh
      stage_fixed: true
    check-spelling:
      run: ./bgord-scripts/check-spelling.sh
    check-shell:
      glob: "*.{sh}"
      run: ./bgord-scripts/check-shell.sh
    check-code:
      run: ./bgord-scripts/check-code.sh
      stage_fixed: true
    check-secrets-staged:
      run: ./bgord-scripts/check-secrets-staged.sh
