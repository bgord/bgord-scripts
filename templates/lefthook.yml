assert_lefthook_installed: true
output: false
pre-push:
  parallel: true
  commands:
    typecheck:
      run: ./bgord-scripts/typecheck.sh
    dead-code:
      run: ./bgord-scripts/dead-code.sh
    test:
      run: ./bgord-scripts/test.sh
    check-drift:
      run: ./bgord-scripts/check-drift.sh
    deps-pin:
      run: ./bgord-scripts/deps-pin.sh
    check-boundaries:
      run: ./bgord-scripts/check-boundaries.sh
    deps-ensure:
      run: ./bgord-scripts/deps-ensure.sh
    deps-audit:
      run: ./bgord-scripts/deps-audit.sh
    lockfile-lint:
      run: ./bgord-scripts/lockfile-lint.sh
    check-ci:
      run: ./bgord-scripts/check-ci.sh

pre-commit:
  parallel: true
  commands:
    format-staged:
      run: ./bgord-scripts/format-staged.sh
      stage_fixed: true
    check-spelling:
      run: ./bgord-scripts/check-spelling.sh
    shellcheck:
      glob: "*.{sh}"
      run: ./bgord-scripts/shellcheck.sh
    check-code:
      run: ./bgord-scripts/check-code.sh
      stage_fixed: true
    gitleaks-scan-staged:
      run: ./bgord-scripts/gitleaks-scan-staged.sh
